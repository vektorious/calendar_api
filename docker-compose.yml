services:
  calendar-api:
    build: .
    # If you push this image to a registry instead of building on the server,
    # replace `build: .` with e.g. `image: yourregistry/calendar-api:latest`
    container_name: calendar-api
    restart: unless-stopped
    ports:
      # The container always listens on 8000 internally. The published HOST
      # port is configurable to avoid clashes with other services — override
      # with HOST_PORT (e.g. HOST_PORT=8087) locally or in Portainer.
      - "${HOST_PORT:-8000}:8000"
    environment:
      # Comma-separated API keys. Generate strong ones, e.g.:
      #   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      # Use one key per consumer (Terminus, your laptop, etc.) so you can
      # revoke one without affecting the others.
      API_KEYS: ${API_KEYS}
      NEXTCLOUD_APP_PASSWORD: ${NEXTCLOUD_APP_PASSWORD:-}
      CALENDAR_CONFIG: /app/sources.yaml
    volumes:
      # Mount your real sources.yaml from the host so it's never baked into
      # the image and you can edit it without rebuilding.
      #
      # Local dev defaults to ./sources.yaml next to this file. On a remote
      # host (e.g. a Portainer repository stack, where the compose file lives
      # in a managed checkout that does NOT contain your gitignored
      # sources.yaml), set SOURCES_FILE to an absolute host path instead, e.g.
      #   SOURCES_FILE=/opt/calendar-api/sources.yaml
      - ${SOURCES_FILE:-./sources.yaml}:/app/sources.yaml:ro
